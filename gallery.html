<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thư viện ảnh hoạt động của ACVNI">
    <title>Gallery - ACVNI</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="assets/logo_new.jpg">
</head>

<body>
    <!-- Reusing Header from Index, but simpler -->
    <!-- Simplified Header for Secondary Pages -->
    <header id="header" class="scrolled simple-header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <img src="assets/logo_new.jpg" alt="ACVNI Logo">
            </a>

            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="vi">VI</button>
                <span class="separator">|</span>
                <button class="lang-btn" data-lang="fr">FR</button>
                <span class="separator">|</span>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
        </div>
    </header>

    <main style="padding-top: 100px;">

        <!-- Gallery Layout based on Reference Image -->
        <!-- Row 1 -->
        <section class="gallery-showcase">
            <div class="container showcase-grid">
                <div class="showcase-content">
                    <h4 class="showcase-subtitle" data-i18n="gallery_page.subtitle_1">Hoạt động nổi bật</h4>
                    <h1 class="showcase-title" data-i18n="gallery_page.title_1">TẾT NGUYÊN ĐÁN <br>2025</h1>
                    <a href="album.html" class="showcase-link" data-i18n="gallery_page.view_album">Xem Album Ảnh</a>
                </div>
                <div class="showcase-image">
                    <img src="assets/slide1.JPG" alt="Tet Nguyen Dan">
                </div>
            </div>
        </section>

        <!-- Row 2 -->
        <section class="gallery-showcase">
            <div class="container showcase-grid reverse">
                <div class="showcase-content">
                    <h4 class="showcase-subtitle" data-i18n="gallery_page.subtitle_2">Giao lưu văn hóa</h4>
                    <h1 class="showcase-title" data-i18n="gallery_page.title_2">LỄ HỘI MÙA HÈ <br>NICE 2024</h1>
                    <a href="album.html" class="showcase-link" data-i18n="gallery_page.view_album">Xem Album Ảnh</a>
                </div>
                <div class="showcase-image">
                    <img src="assets/slide2.JPG" alt="Le Hoi Mua He">
                </div>
            </div>
        </section>

        <!-- Row 3 -->
        <section class="gallery-showcase">
            <div class="container showcase-grid">
                <div class="showcase-content">
                    <h4 class="showcase-subtitle" data-i18n="gallery_page.subtitle_3">Cộng đồng</h4>
                    <h1 class="showcase-title" data-i18n="gallery_page.title_3">GẶP GỠ <br>TÂN SINH VIÊN</h1>
                    <a href="album.html" class="showcase-link" data-i18n="gallery_page.view_album">Xem Album Ảnh</a>
                </div>
                <div class="showcase-image">
                    <img src="assets/slide3.JPG" alt="Gap Go Tan Sinh Vien">
                </div>
            </div>
        </section>

    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <h3>ACVNI</h3>
                    <p>Cộng đồng người Việt tại Nice</p>
                </div>
                <div class="footer-links-group">
                    <a href="index.html">Quay lại trang chủ</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 ACVNI.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
