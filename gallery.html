<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thư viện ảnh hoạt động của ACVNI">
    <title>Gallery - ACVNI</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="assets/logo_new.webp">
</head>

<body>
    <!-- Reusing Header from Index, but simpler -->
    <!-- Simplified Header for Secondary Pages -->
    <header id="header" class="scrolled simple-header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <img src="assets/logo_new.webp" alt="ACVNI Logo">
            </a>

            <!-- Year Navigation (Gallery Only) -->
            <div class="gallery-header-nav">
                <a href="#" class="header-year-link active" data-filter="year-2026">2026</a>
            </div>

            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="vi">VI</button>
                <span class="separator">|</span>
                <button class="lang-btn" data-lang="fr">FR</button>
                <span class="separator">|</span>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
        </div>
    </header>

    <main style="padding-top: 100px;">



        <!-- Gallery Layout based on Reference Image -->
        <!-- Year 2026 Group -->
        <div id="year-2026" class="year-group">
            <!-- Tet Nguyen Dan (Oldest 2025) -->
            <section class="gallery-showcase">
                <div class="container showcase-grid">
                    <div class="showcase-content">
                        <h4 class="showcase-subtitle" data-i18n="gallery_page.subtitle_1">Hoạt động nổi bật</h4>
                        <h1 class="showcase-title" data-i18n="gallery_page.title_1">TẾT NGUYÊN ĐÁN <br>2026</h1>
                        <a href="album.html" class="showcase-link" data-i18n="gallery_page.view_album">Xem Album Ảnh</a>
                    </div>
                    <div class="showcase-image">
                        <img src="assets/album1/image1.JPG" alt="Tet Nguyen Dan" loading="lazy" decoding="async">
                    </div>
                </div>
            </section>

            <!-- Consular Service (Newest 2026) -->
            <section class="gallery-showcase">
                <div class="container showcase-grid reverse">
                    <div class="showcase-content">
                        <h4 class="showcase-subtitle" data-i18n="album_consular.subtitle">Hỗ Trợ Cộng Đồng</h4>
                        <h1 class="showcase-title" data-i18n="album_consular.title">THỦ TỤC <br>LÃNH SỰ</h1>
                        <a href="album_consular.html" class="showcase-link" data-i18n="gallery_page.view_album">Xem
                            Album Ảnh</a>
                    </div>
                    <div class="showcase-image">
                        <img src="assets/album2/image1.jpg" alt="Consular Service" loading="lazy" decoding="async">
                    </div>
                </div>
            </section>
        </div>



    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <h3>ACVNI</h3>
                    <p>Cộng đồng người Việt tại Nice</p>
                </div>
                <div class="footer-links-group">
                    <a href="index.html">Quay lại trang chủ</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 ACVNI.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
